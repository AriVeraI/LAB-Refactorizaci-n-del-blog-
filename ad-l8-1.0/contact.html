<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contacto - Relatos de Terror</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      background-color: #F7F7F7 !important;
    }
    .titulo-principal {
      color: #4A0B22 !important;
    }
    .btn-personalizado {
      background-color: #7F055F !important;
      color: #FFFFFF !important;
      border: none;
    }
    .form-control {
      border: 2px solid #000000 !important;
      border-radius: 4px;
    }
  </style>
</head>

<body>

  <div class="container-fluid min-vh-100 d-flex flex-column justify-content-center">
    <div class="row flex-grow-1">
      
      <div class="col-md-2 d-none d-md-flex align-items-center justify-content-center border-end p-2">
        <img src="https://images.unsplash.com/photo-1509248961158-e54f6934749c?w=400&q=80" alt="Publicidad de Terror" class="img-fluid rounded shadow">
      </div>

      <div class="col-md-8 p-5">
        <h2 class="text-center mb-4 titulo-principal">¿Tienes una historia que no te deja dormir?</h2>
        
        <div id="contactoAlertPlaceholder"></div>

        <form id="formularioContacto">
          
          <div class="mb-3">
            <label for="inputEmail" class="form-label">Correo electrónico</label>
            <input type="email" class="form-control" id="inputEmail" placeholder="tu@correo.com" required>
          </div>
          
          <div class="mb-3">
            <label for="inputMensaje" class="form-label">Envía tu relato o mensaje</label>
            <textarea class="form-control" id="inputMensaje" rows="6" placeholder="Escribe aquí tu peor pesadilla..." required></textarea>
          </div>
          
          <button type="submit" class="btn btn-personalizado">Enviar relato</button>
          
        </form>
      </div>

      <div class="col-md-2 d-none d-md-flex align-items-center justify-content-center border-start p-2">
        <img src="https://images.unsplash.com/photo-1535905557558-afc4877a26fc?w=400&q=80" alt="Noticias Macabras" class="img-fluid rounded shadow">
      </div>

    </div>
  </div>
  <iframe src="footer.html" style="width: 100%;"></iframe>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="https://jsdelivr.net"></script>
  <script src="script.js"></script>
  <script src="https://replit.com/public/js/replit-badge-v2.js" theme="dark" position="bottom-right"></script>
</body>

<div id="espacio-navbar"></div>
<div class="container-fluid">
    <div class="row">
       ...
       <script>
    // Le decimos al navegador que en cuanto cargue tu página, vaya por el menú
    document.addEventListener("DOMContentLoaded", function() {
        fetch("barra.html") 
            .then(response => response.text())
            .then(codigoHtml => {
                // Inserta el menú de tus compañeros exactamente en tu espacio reservado
                document.getElementById("espacio-navbar").innerHTML = codigoHtml;
            })
            .catch(error => console.error("No se pudo cargar el menú:", error));
    });
</script>

</html>
